name: "[Workflow] Path to Live"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  checks: read
  contents: write
  deployments: none
  id-token: write
  issues: none
  packages: none
  pull-requests: write
  repository-projects: none
  security-events: write
  statuses: none

jobs:
  branch_name:
    runs-on: ubuntu-latest
    name: Extract branch name
    outputs:
      formatted_branch: ${{ steps.extract_branch.outputs.safe }}
    steps:
      - name: Extract branch
        id: extract_branch
        uses: ministryofjustice/opg-github-actions/actions/branch-name@ed64099d769e1e9439d4523f7612987618c1b6cd # v4.8.7

  create_tags:
    name: Create Tags
    needs: ['branch_name']
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.semver.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Bump version
        id: semver
        uses: ministryofjustice/opg-github-actions/actions/semver@ed64099d769e1e9439d4523f7612987618c1b6cd # v4.8.7
        with:
          prerelease: "false"
          default_bump: minor

  docker_build_scan_push:
    name: Build, Scan and Push
    needs: [ 'create_tags', 'branch_name' ]
    uses: ./.github/workflows/sub-task-docker-build.yml
    with:
      tag: ${{ needs.create_tags.outputs.version_tag }}
      branch_name: ${{ needs.branch_name.outputs.formatted_branch }}
    secrets:
      SNYK_OPG_ORG_TOKEN: ${{ secrets.SNYK_OPG_ORG_TOKEN }}

  development_account_plan_apply:
    name: Development Account Terraform Plan and Apply
    needs: [
      'docker_build_scan_push',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/account'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      workspace: development
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.DEVELOPMENT_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
      use_ssh_private_key: false
    secrets:
      pagerduty_token: ${{ secrets.PAGERDUTY_TOKEN }}

  development_environment_apply_with_mock_sirius:
    name: Development Environment Terraform Plan and Apply Mock Sirius
    needs: [
      'development_account_plan_apply',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/environment'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      mock_sirius: "true"
      use_ssh_private_key: true
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.DEVELOPMENT_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
      workspace: development
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

  development_integration_tests:
    name: Development Run integration tests
    needs: [
      'development_environment_apply_with_mock_sirius'
    ]
    uses: ./.github/workflows/sub-task-integration-tests.yml
    with:
      environment: 'development'
      workspace: 'development'

  development_environment_plan_apply:
    name: Development Environment Terraform Plan and Apply
    needs: [
      'development_integration_tests',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/environment'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      use_ssh_private_key: true
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.DEVELOPMENT_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
      workspace: development
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

  preproduction_account_plan_apply:
    name: Preproduction Account Terraform Plan and Apply
    needs: [
      'development_environment_plan_apply',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/account'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      workspace: preproduction
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.PREPRODUCTION_MAIN_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
      use_ssh_private_key: false
    secrets:
      pagerduty_token: ${{ secrets.PAGERDUTY_TOKEN }}

  preproduction_environment_plan_apply:
    name: Preproduction Environment Terraform Plan and Apply
    needs: [
      'preproduction_account_plan_apply',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/environment'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      use_ssh_private_key: true
      workspace: preproduction
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.PREPRODUCTION_MAIN_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

  production_account_plan_apply:
    name: Production Account Terraform Plan and Apply
    needs: [
      'preproduction_environment_plan_apply',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/account'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      workspace: production
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.PRODUCTION_MAIN_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
    secrets:
      pagerduty_token: ${{ secrets.PAGERDUTY_TOKEN }}

  production_environment_plan_apply:
    name: Production Environment Terraform Plan and Apply
    needs: [
      'production_account_plan_apply',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/environment'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      use_ssh_private_key: true
      workspace: production
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.PRODUCTION_MAIN_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

  demo_environment_plan_apply:
    name: Demo Environment Terraform Plan and Apply
    needs: [
      'production_environment_plan_apply',
      'create_tags'
    ]
    uses: ./.github/workflows/sub-task-terraform.yml
    with:
      apply: true
      terraform_path: 'terraform/environment'
      image_tag: main-${{ needs.create_tags.outputs.version_tag }}
      use_ssh_private_key: true
      workspace: demo
      oidc_role: ${{ vars.OIDC_MAIN_ROLE }}
      default_role: ${{ vars.DEVELOPMENT_ROLE }}
      management_role: ${{ vars.MANAGEMENT_ROLE }}
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

  workflow_complete:
    name: Workflow Complete
    needs: ['production_environment_plan_apply', 'demo_environment_plan_apply']
    runs-on: ubuntu-latest
    steps:
      - name: Completion message
        run: echo "Workflow Complete - Released to Live"
